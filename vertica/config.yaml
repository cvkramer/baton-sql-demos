# baton-sql configuration for Vertica
# Includes provisioning (grant/revoke) support

users:
  query: |
    SELECT
      id,
      email,
      first_name,
      last_name,
      status
    FROM users
  id: id
  email: email
  displayName: "{{ .first_name }} {{ .last_name }}"
  status: status
  statusMap:
    active: enabled
    inactive: disabled
    suspended: disabled

groups:
  query: |
    SELECT
      id,
      name,
      description
    FROM groups
  id: id
  displayName: name
  description: description

  static_entitlements:
    - id: "member"
      display_name: "Member"
      description: "Group membership"
      purpose: "assignment"
      grantable_to:
        - "user"

      provisioning:
        vars:
          user_id: "principal.ID"
          group_id: "resource.ID"

        grant:
          queries:
            # Vertica uses MERGE for upsert operations
            - |
              MERGE INTO group_memberships gm
              USING (SELECT ?<user_id> AS user_id, ?<group_id> AS group_id) src
              ON gm.user_id = src.user_id AND gm.group_id = src.group_id
              WHEN NOT MATCHED THEN
                INSERT (user_id, group_id, role, created_at)
                VALUES (src.user_id, src.group_id, 'member', CURRENT_TIMESTAMP)

        revoke:
          queries:
            - |
              DELETE FROM group_memberships
              WHERE user_id = ?<user_id> AND group_id = ?<group_id>

  grants:
    query: |
      SELECT
        gm.group_id,
        gm.user_id,
        'member' as entitlement
      FROM group_memberships gm
    entitlement: entitlement
    principalId: user_id
    principalType: user
    resourceId: group_id
